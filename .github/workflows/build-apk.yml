name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile_app/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: |
          cd mobile_app
          npm install

      - name: Expo prebuild (génère le projet Android natif)
        run: |
          cd mobile_app
          npx expo prebuild --platform android --no-install

      - name: Générer un keystore de signature pour la CI
        run: |
          keytool -genkey -v \
            -keystore /tmp/release.keystore \
            -alias release \
            -keyalg RSA -keysize 2048 -validity 9125 \
            -storepass android -keypass android \
            -dname "CN=IoT-Sentinelle, OU=CI, O=CI, L=CI, S=CI, C=FR"

      - name: Build APK Release (JS toujours bundlé)
        run: |
          cd mobile_app/android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=/tmp/release.keystore \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=release \
            -Pandroid.injected.signing.key.password=android \
            --no-daemon

      - name: Upload APK comme artefact
        uses: actions/upload-artifact@v4
        with:
          name: IoT-Sentinelle-release
          path: mobile_app/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Créer ou mettre à jour la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: "IoT-Sentinelle — APK Android (dernière version)"
          body: |
            APK release généré automatiquement depuis la branche `main`.
            Le bundle JavaScript est inclus — **aucun Metro ni PC requis**.

            **Installation :**
            1. Transférer `app-release.apk` sur votre Android
            2. Activer "Sources inconnues" dans les paramètres
            3. Ouvrir le fichier APK pour installer

            **Permissions requises :** Bluetooth, Caméra, Localisation
          files: mobile_app/android/app/build/outputs/apk/release/app-release.apk
          make_latest: true
