version: "3"

tasks:
  install:
    desc: Install JavaScript dependencies
    cmds:
      - npm install --legacy-peer-deps

  start:
    desc: Start Expo dev server
    cmds:
      - npm run start

  web:
    desc: Run the app in the browser
    cmds:
      - npm run web

  patch:android:
    desc: Patch Android build files for Nix compatibility
    internal: true
    cmds:
      - |
        if [ ! -d "android" ]; then
          CI=1 npx expo prebuild --platform android --no-install
        fi
      - |
        if ! grep -q "compileSdkVersion = 36" android/build.gradle; then
          sed -i 's/buildscript {/buildscript {\n  ext {\n    buildToolsVersion = "36.1.0"\n    compileSdkVersion = 36\n    targetSdkVersion = 36\n    ndkVersion = "27.1.12297006"\n  }/' android/build.gradle
        fi
      - |
        if ! grep -q "debuggableVariants" android/app/build.gradle; then
          sed -i '/hermesFlags =/a \    debuggableVariants = []' android/app/build.gradle
        fi

  android:
    desc: Run the app on an Android emulator or device
    cmds:
      - task: patch:android
      - npm run android

  ios:
    desc: Run the app on an iOS simulator (macOS only)
    cmds:
      - npm run ios

  typecheck:
    desc: TypeScript checks
    cmds:
      - npm run typecheck

  test:
    desc: Run unit tests
    cmds:
      - npm run test

  build:
    desc: Production bundle export for all platforms
    deps:
      - typecheck
    cmds:
      - npm run build

  apk:
    desc: Build Android APK locally
    deps:
      - typecheck
      - test
    cmds:
      - task: patch:android
      - cd android && JAVA_HOME=${JAVA_HOME} ANDROID_HOME=${ANDROID_HOME} ANDROID_NDK_HOME=${ANDROID_NDK_HOME} ./gradlew assembleRelease
      - cp android/app/build/outputs/apk/release/app-release.apk ./app.apk
      - echo "APK ready at ./app.apk (ignored by git)"

  emulator:create:
    desc: Create Android Virtual Device (AVD)
    cmds:
      - echo "no" | JAVA_HOME=${JAVA8_HOME} ANDROID_HOME=${ANDROID_HOME} ANDROID_SDK_ROOT=${ANDROID_HOME} avdmanager create avd -n test_avd -k "system-images;android-34;google_apis;x86_64" --force

  emulator:start:
    desc: Start emulator in headless mode
    cmds:
      - JAVA_HOME=${JAVA8_HOME} ANDROID_HOME=${ANDROID_HOME} ANDROID_SDK_ROOT=${ANDROID_HOME} $ANDROID_HOME/emulator/emulator -avd test_avd -no-window -no-audio -no-boot-anim &
      - adb wait-for-device
      - echo "Emulator is ready"

  emulator:list:
    desc: List available emulators
    cmds:
      - JAVA_HOME=${JAVA8_HOME} ANDROID_HOME=${ANDROID_HOME} ANDROID_SDK_ROOT=${ANDROID_HOME} $ANDROID_HOME/emulator/emulator -list-avds

  emulator:run:
    desc: Run a specific emulator (usage task emulator:run -- AVD=name)
    cmds:
      - JAVA_HOME=${JAVA8_HOME} ANDROID_HOME=${ANDROID_HOME} ANDROID_SDK_ROOT=${ANDROID_HOME} $ANDROID_HOME/emulator/emulator -avd {{.AVD}} -no-snapshot-load

  test:smoke:
    desc: Install APK and detect crashes systematically
    deps: [apk]
    cmds:
      - adb install -r app.apk
      - adb logcat -c
      - adb shell monkey -p com.collet.be -c android.intent.category.LAUNCHER 1 || adb shell am start -n com.collet.be/com.collet.be.MainActivity
      - sleep 5
      - |
        if adb logcat -d | grep -Ei "FATAL EXCEPTION|RuntimeError|DataBinding|AndroidRuntime"; then
          echo "CRASH DETECTED!"
          adb logcat -d | grep -B 5 -A 20 -Ei "FATAL EXCEPTION|RuntimeError|DataBinding|AndroidRuntime"
          exit 1
        else
          echo "No crash detected in logs."
        fi
      - echo "SMOKE TEST PASSED!"

  release:github:
    desc: Create a GitHub release and upload the APK asset
    deps: [apk]
    cmds:
      - gh release create v1.0.0-$(date +%Y%m%d%H%M) app.apk --title "Production Release $(date +'%Y-%m-%d %H:%M')" --notes "Version stable avec scanner QR Code"
      - echo "GitHub Release created successfully!"

  default:
    desc: Default validation task
    cmds:
      - task: build
